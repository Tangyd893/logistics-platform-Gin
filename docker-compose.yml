version: '3.8'

services:
  # ===================== 后端服务 =====================
  backend:
    image: golang:1.23-alpine
    container_name: logistics-gin-backend
    working_dir: /app/backend
    volumes:
      - ./backend:/app/backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=logistics_user
      - DB_PASSWORD=logistics_pass
      - DB_NAME=logistics
      - JWT_SECRET=logistics-platform-secret-key-256bit
      # MinIO
      - MINIO_ENABLED=true
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=logistics
      # RocketMQ
      - ROCKETMQ_ENABLED=true
      - ROCKETMQ_NAMESRV_ADDR=rocketmq-namesrv:9876
      # Redis
      - REDIS_ENABLED=true
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: >
      sh -c "
      wget -qO- https://go.dev/dl/go1.23.4.linux-amd64.tar.gz | tar -xzf - -C /usr/local &&
      export PATH=/usr/local/go/bin:$PATH &&
      export GOPROXY=https://goproxy.cn,direct &&
      cd /app/backend &&
      go build -o logistics-gin . &&
      ./logistics-gin
      "
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1

  # ===================== 前端开发服务器 =====================
  frontend:
    image: node:20-alpine
    container_name: logistics-gin-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://backend:8080
    command: >
      sh -c "
      cd /app &&
      npm install &&
      npx vite --port 3000 --host 0.0.0.0
      "
    depends_on:
      - backend
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1

  # ===================== 数据库 =====================
  postgres:
    image: postgres:16-alpine
    container_name: logistics-gin-postgres
    environment:
      POSTGRES_DB: logistics
      POSTGRES_USER: logistics_user
      POSTGRES_PASSWORD: logistics_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics_user -d logistics"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m

  # ===================== Redis（可选） =====================
  redis:
    image: redis:7-alpine
    container_name: logistics-gin-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    mem_limit: 256m

  # ===================== MinIO 对象存储 =====================
  minio:
    image: minio/minio:latest
    container_name: logistics-gin-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    mem_limit: 300m

  # ===================== RocketMQ NameServer =====================
  rocketmq-namesrv:
    image: apache/rocketmq:5.3.0
    container_name: logistics-gin-rocketmq-namesrv
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT: "-Xms200m -Xmx200m"
    volumes:
      - rocketmq_namesrv_data:/home/rocketmq/namesrv/logs
    command: sh mqnamesrv
    restart: unless-stopped
    mem_limit: 200m

  # ===================== RocketMQ Broker =====================
  rocketmq-broker:
    image: apache/rocketmq:5.3.0
    container_name: logistics-gin-rocketmq-broker
    ports:
      - "10911:10911"
    environment:
      JAVA_OPT: "-Xms1g -Xmx1g"
      ROCKETMQ_HOME: /home/rocketmq/rocketmq-5.3.0
    volumes:
      - rocketmq_broker_data:/home/rocketmq/broker/logs
    depends_on:
      - rocketmq-namesrv
    command: sh mqbroker -n rocketmq-namesrv:9876 -c /home/rocketmq/rocketmq-5.3.0/broker.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    mem_limit: 1536m

volumes:
  postgres_data:
  redis_data:
  minio_data:
  rocketmq_namesrv_data:
  rocketmq_broker_data:
